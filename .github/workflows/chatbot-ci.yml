# Chatbot module CI — typecheck, lint, tests, and Module 3 replay smoke.
name: Chatbot — CI

on:
  push:
    branches: [main]
    paths:
      - "chatbot/**"
      - "chatbot-tests/**"
      - ".github/workflows/chatbot-ci.yml"
  pull_request:
    paths:
      - "chatbot/**"
      - "chatbot-tests/**"

jobs:
  typecheck:
    name: TypeScript strict typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chatbot
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm install
      - name: Typecheck
        run: npx tsc --noEmit

  tests:
    name: Vitest unit + integration tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chatbot
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm install
      - name: Run tests
        # Vitest auto-skips the labelled-set tests that require live LLM
        # credentials (intent-router.test.ts, ragas-faithfulness eval).
        # Unit tests for guard / memory / observability / cost-tracker run
        # deterministically.
        run: npm test

  smoke:
    name: Smoke — orchestrator imports cleanly
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chatbot
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        run: npm install
      - name: Verify imports resolve
        env:
          OPENAI_API_KEY: sk-mock-for-import-check
        run: |
          npx tsx --eval "
            import('./src/index.ts').then(() => console.log('✓ orchestrator imports'));
            import('./src/agents/intent-router.ts').then(() => console.log('✓ router imports'));
            import('./src/agents/faq-agent.ts').then(() => console.log('✓ faq agent imports'));
            import('./src/agents/escalation-handler.ts').then(() => console.log('✓ escalation imports'));
            import('./src/rag/retriever.ts').then(() => console.log('✓ retriever imports'));
            import('./src/guard.ts').then(() => console.log('✓ guard imports'));
            import('./src/conversation-memory.ts').then(() => console.log('✓ memory imports'));
            import('./src/observability.ts').then(() => console.log('✓ observability imports'));
          "

  module3-skeleton:
    name: Module 3 — replay scenarios parse
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chatbot-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install chatbot deps (used by replay runner)
        working-directory: chatbot
        run: npm install
      - name: Validate scenario JSON files
        # Lightweight CI check — parses every scenarios/*.json and confirms
        # required keys (id, description, language, turns). The full live
        # replay needs a backend secret and runs only on demand via
        # workflow_dispatch (see module3-replay job).
        run: |
          node --input-type=module -e "
            import { readdirSync, readFileSync } from 'node:fs';
            const files = readdirSync('scenarios').filter(f => f.endsWith('.json'));
            for (const f of files) {
              const s = JSON.parse(readFileSync('scenarios/' + f, 'utf8'));
              for (const k of ['id', 'description', 'language', 'turns']) {
                if (!(k in s)) { console.error('✗', f, 'missing key:', k); process.exit(1); }
              }
              console.log('✓', f, '·', s.turns.length, 'turn(s)');
            }
          "
